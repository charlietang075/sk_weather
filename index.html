<!DOCTYPE html>
<html lang="en">
<body>
    <div id="weather-dashboard">
        <h2>Sai Kung Weather</h2>
        <div id="current-temp">Loading current temperature...</div>
        <div id="daily-range">Loading forecast...</div>
    </div>

    <script>
        async function getSaiKungWeather() {
            try {
                // 1. Fetch Current Conditions
                const resCurrent = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=en');
                const currentData = await resCurrent.json();
                
                // Find Sai Kung in the list
                const skTemp = currentData.temperature.data.find(s => s.place === 'Sai Kung');
                document.getElementById('current-temp').innerHTML = `<strong>Current:</strong> ${skTemp.value}°C`;

                // 2. Fetch 9-Day Forecast (for today's max/min)
                const resForecast = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=en');
                const forecastData = await resForecast.json();
                
                // Get today's forecast (index 0)
                const today = forecastData.weatherForecast[0];
                document.getElementById('daily-range').innerHTML = 
                    `<strong>Today:</strong> High ${today.forecastMaxtemp.value}°C / Low ${today.forecastMintemp.value}°C`;

            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }
        getSaiKungWeather();
    </script>
</body>
</html>
