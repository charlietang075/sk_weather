<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sai Kung Weather</title>
    <style>
        /* Basic reset and layout */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f0f4f8; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        /* Card styling */
        .weather-card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 16px; 
            box-shadow: 0 10px 15px rgba(0,0,0,0.05); 
            max-width: 350px; 
            width: 100%; 
            text-align: center; 
        }
        
        h1 { 
            color: #1a202c; 
            font-size: 1.5rem; 
            margin-top: 0; 
            margin-bottom: 0.5rem;
        }
        
        /* Typography */
        .temp { 
            font-size: 4rem; 
            font-weight: bold; 
            color: #2b6cb0; 
            margin: 10px 0; 
            line-height: 1;
        }
        
        .details { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 25px; 
            color: #4a5568; 
            font-size: 0.95rem;
            font-weight: 500;
        }
        
        /* Warning box styling */
        .warning-box { 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 0.9rem; 
            font-weight: 500;
            line-height: 1.4;
        }
        
        .has-warning { 
            background: #feebc8; 
            color: #c05621; 
            border: 1px solid #fbd38d;
        }
        
        .no-warning { 
            background: #c6f6d5; 
            color: #22543d; 
            border: 1px solid #9ae6b4;
        }
    </style>
</head>
<body>

<div class="weather-card">
    <h1>Sai Kung</h1>
    <div class="temp" id="current-temp">--°C</div>
    
    <div class="details">
        <div>High: <span id="day-high">--</span>°C</div>
        <div>Low: <span id="day-low">--</span>°C</div>
        <div>Humidity: <span id="humidity">--</span>%</div>
    </div>
    
    <div class="warning-box" id="warning-box">Loading warnings...</div>
</div>

<script>
   async function fetchWeather() {
    try {
        // 1. Fetch Current Weather
        const currentRes = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=en');
        const currentData = await currentRes.json();
        
        const saikungTemp = currentData.temperature.data.find(d => d.place === 'Sai Kung');
        if (saikungTemp) {
            document.getElementById('current-temp').innerText = `${saikungTemp.value}°C`;
        }

        if (currentData.humidity && currentData.humidity.data.length > 0) {
            document.getElementById('humidity').innerText = currentData.humidity.data[0].value;
        }

        // 2. Fetch Forecast (General Hong Kong Data)
const forecastRes = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=en');
const forecastData = await forecastRes.json();

if (forecastData.weatherForecast && forecastData.weatherForecast.length > 0) {
    const today = forecastData.weatherForecast[0];
    // These reflect the forecast for the whole of Hong Kong
    document.getElementById('day-high').innerText = today.forecastMaxt.value;
    document.getElementById('day-low').innerText = today.forecastMint.value;
}
       // 3. Fetch Active Warnings
const warnRes = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=en');
const warnings = await warnRes.json();

const warningBox = document.getElementById('warning-box');
const warningKeys = Object.keys(warnings);

if (warningKeys.length > 0) {
    let activeAlerts = [];
    
    // Map of HKO codes to readable labels
    const rainstormMap = {
        'WRAINA': 'Amber Rainstorm Warning',
        'WRAINR': 'Red Rainstorm Warning',
        'WRAINB': 'Black Rainstorm Warning'
    };

    warningKeys.forEach(key => {
        // If it's a rainstorm code, use our label; otherwise use the API's provided name
        const alertName = rainstormMap[key] || warnings[key].name;
        activeAlerts.push(alertName);
    });

    warningBox.innerHTML = `<strong>Active Warnings:</strong><br>${activeAlerts.join('<br>')}`;
    warningBox.className = 'warning-box has-warning';
} else {
    warningBox.innerText = "No active warnings.";
    warningBox.className = 'warning-box no-warning';
}
    } catch (error) {
        console.error("Error fetching weather data:", error);
        document.getElementById('warning-box').innerText = "Data unavailable.";
    }
}
    // Run the function when the page loads
    fetchWeather();
</script>

</body>
</html>
