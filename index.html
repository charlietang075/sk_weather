<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sai Kung Weather Dashboard</title>
    <!-- Tailwind CSS for clean, modern styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full space-y-4">
        <!-- Main Dashboard Card -->
        <div class="bg-slate-800 border border-slate-700/50 rounded-3xl shadow-2xl p-6 relative overflow-hidden">
            
            <!-- Header Info -->
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-2xl font-bold tracking-tight text-blue-400">Sai Kung</h1>
                    <p class="text-xs text-slate-400 mt-0.5">Current Local Conditions</p>
                </div>
                <div id="update-time" class="text-right text-[10px] text-slate-500 font-mono">Loading...</div>
            </div>

            <!-- Metrics Grid (Temperature & Humidity) -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-6 mb-4">
                
                <!-- Temperature Display -->
                <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-6 rounded-2xl shadow-inner text-center">
                    <p class="text-xs uppercase tracking-wider text-blue-200 font-semibold mb-2">Sai Kung Temp</p>
                    <div class="flex items-baseline justify-center">
                        <span id="current-temp" class="text-6xl font-extrabold tracking-tighter">--</span>
                        <span class="text-2xl font-medium ml-1 text-blue-200">°C</span>
                    </div>
                </div>

                <!-- Humidity Display -->
                <div class="bg-slate-900/50 border border-slate-700/40 p-6 rounded-2xl shadow-inner text-center">
                    <p class="text-xs uppercase tracking-wider text-slate-400 font-semibold mb-2">Sai Kung Humidity</p>
                    <div class="flex items-baseline justify-center">
                        <span id="current-humidity" class="text-6xl font-extrabold tracking-tighter text-teal-400">--</span>
                        <span class="text-2xl font-medium ml-1 text-teal-500">%</span>
                    </div>
                </div>

            </div>

            <!-- Daily Range Matrix -->
            <div class="grid grid-cols-2 gap-4 border-t border-slate-700/60 py-4 text-center">
                <div>
                    <p class="text-xs uppercase tracking-wider text-slate-400 font-semibold">Daily Low</p>
                    <p id="daily-low" class="text-2xl font-bold text-blue-300 mt-1">--°C</p>
                </div>
                <div class="border-l border-slate-700/60">
                    <p class="text-xs uppercase tracking-wider text-slate-400 font-semibold">Daily High</p>
                    <p id="daily-high" class="text-2xl font-bold text-orange-400 mt-1">--°C</p>
                </div>
            </div>

            <!-- Today's Weather Warning Section -->
            <div class="border-t border-slate-700/60 pt-4 mt-2">
                <h2 class="text-xs uppercase tracking-wider text-slate-400 font-semibold mb-3">Today's Warning</h2>
                <div id="warning-display" class="bg-slate-900/40 rounded-xl p-4 border border-slate-700/30 min-h-[72px] flex items-center justify-center">
                    <!-- Warnings or No Warning text will insert here dynamically -->
                    <span class="text-slate-500 text-sm">Checking active alerts...</span>
                </div>
            </div>

        </div>
    </div>

    <!-- HKO Live Integration Logic -->
    <script>
        const API_URL = "https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=en";

        async function fetchSaiKungWeather() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                // 1. Extract Current Temperature for Sai Kung
                const skTempRecord = data.temperature.data.find(item => item.place === "Sai Kung");
                if (skTempRecord) {
                    document.getElementById('current-temp').innerText = skTempRecord.value;
                }

                // 2. Extract Current Humidity for Sai Kung
                const skHumidityRecord = data.humidity.data.find(item => item.place === "Sai Kung");
                if (skHumidityRecord) {
                    document.getElementById('current-humidity').innerText = skHumidityRecord.value;
                } else if (data.humidity.data.length > 0) {
                    document.getElementById('current-humidity').innerText = data.humidity.data[0].value;
                }

                // 3. Extract Territory Daily Low / High Range
                if (data.temperature.data.length > 0) {
                    const validTemps = data.temperature.data
                        .map(item => parseFloat(item.value))
                        .filter(val => !isNaN(val));

                    if (validTemps.length > 0) {
                        const low = Math.min(...validTemps);
                        const high = Math.max(...validTemps);
                        
                        document.getElementById('daily-low').innerText = `${Math.floor(low)}°C`;
                        document.getElementById('daily-high').innerText = `${Math.ceil(high)}°C`;
                    }
                }

                // 4. Dynamic Warning Logo Parser
                const warningDisplay = document.getElementById('warning-display');
                warningDisplay.innerHTML = ''; // Clear previous state

                if (data.warningCode && data.warningCode.length > 0) {
                    // Create an alignment container for active logs
                    const warningWrapper = document.createElement('div');
                    warningWrapper.className = "flex flex-col gap-3 w-full";

                    data.warningCode.forEach(code => {
                        // Sanitize the internal HKO warning string pattern
                        const cleanCode = code.replace(/[^a-zA-Z0-9]/g, "").toLowerCase();
                        
                        // Row layout imitating the structure inside image_bad066.png
                        const warningRow = document.createElement('div');
                        warningRow.className = "flex items-center space-x-4 bg-slate-800/60 p-2.5 rounded-xl border border-rose-500/20";
                        
                        warningRow.innerHTML = `
                            <img src="https://www.hko.gov.hk/en/wxinfo/static/images/error_${cleanCode}.png" 
                                 alt="${code}" 
                                 class="w-12 h-12 object-contain rounded"
                                 onerror="this.style.display='none';">
                            <div>
                                <p class="text-[11px] font-bold text-rose-400 uppercase tracking-wide">Active Signal</p>
                                <p class="text-sm font-semibold text-slate-200">${code.replace(/([A-Z])/g, ' $1').trim()}</p>
                            </div>
                        `;
                        warningWrapper.appendChild(warningRow);
                    });
                    warningDisplay.appendChild(warningWrapper);
                } else {
                    // Default safe status display if there are no flags raised
                    warningDisplay.innerHTML = `
                        <div class="flex items-center space-x-2 text-emerald-400/80">
                            <span>✅</span>
                            <span class="text-sm font-medium">No Active Weather Warnings</span>
                        </div>
                    `;
                }

                // 5. Update Sync Timestamp from HKO
                const updateTime = new Date(data.updateTime);
                document.getElementById('update-time').innerText = `HKO Sync:\n${updateTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;

            } catch (error) {
                console.error("Failed to connect to HKO API:", error);
                document.getElementById('update-time').innerText = "Sync Error";
            }
        }

        // Initialize and setup automatic refresh every 5 minutes
        fetchSaiKungWeather();
        setInterval(fetchSaiKungWeather, 300000);
    </script>
</body>
</html>
